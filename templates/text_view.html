<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCUS CURRIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .latin-text { 
            font-weight: normal;
            font-family: Georgia, serif;
            line-height: 1.6; 
            white-space: pre-wrap; 
            max-width: 800px; 
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">MARCUS CURRIT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/"><b>Словарик</a></li>
            <li class="nav-item"><a class="nav-link" href="/library">Библиотека</a></li>
          </ul>
        </div>
      </div>
    </nav>


    <main class="container">
        <div class="my-4">
            <button type="button" class="btn btn-primary">
                <a href="{{ url_for('author_texts', author_slug=author_slug) }}" class="btn btn-primary">← {{ author_name }}</a>
            </button>
        </div>

        <div style="max-width: 800px; margin: 0 auto;">
        <h1>{{ text.title }}</h1>
        <div class="latin-text"><p>{{ text.content }}</p></div>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
