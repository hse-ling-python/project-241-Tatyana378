<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCUS CURRIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">MARCUS CURRIT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/"><b>Словарик</a></li>
            <li class="nav-item"><a class="nav-link" href="/library">Библиотека</a></li>
          </ul>
        </div>
      </div>
    </nav>




    <main class="container">
        <div class="my-4">
            <button type="button" class="btn btn-primary">
                <a href="{{ url_for('library_authors') }}" class="btn btn-primary">← Назад</a>
            </button>
        </div>
        <div class="my-4"><h1>Тексты:</h1></div>
        
        <div class="row g-4">
            {% for text in texts %}
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ text.title }}</h5>

                        <div class="d-flex">
                            <a href="{{ url_for('view_text', author_slug=author_slug, text_id=text.id) }}" class="btn btn-primary ms-auto">
                                Читать
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
