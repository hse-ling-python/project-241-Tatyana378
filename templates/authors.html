<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCUS CURRIT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">MARCUS CURRIT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/"><b>Словарик</a></li>
            <li class="nav-item"><a class="nav-link active" href="/library">Библиотека</a></li>
          </ul>
        </div>
      </div>
    </nav>


    <main class="container">
        <div class="my-4"><h1>Авторы:</h1></div>
        <div class="row g-4">
            {% for author in authors %}
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ author.name }}</h5>

                        <p class="card-text text-muted">
                            <span class="badge rounded-pill bg-secondary">
                                Текстов: {{ author.count }}
                            </span>
                        </p>

                        <div class="d-flex">
                            <a href="{{ url_for('author_texts', author_slug=author.slug) }}" 
                            class="btn btn-primary ms-auto">
                                Смотреть тексты
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
